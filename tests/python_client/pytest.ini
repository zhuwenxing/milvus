[pytest]


addopts = --host 10.104.20.99 --minio_host 10.104.20.98 --target_minio_endpoint 10.104.32.45:9000 --target_minio_bucket_name milvus-bucket  --html=/tmp/ci_logs/report.html --self-contained-html -v --log-cli-level=INFO --capture=no
